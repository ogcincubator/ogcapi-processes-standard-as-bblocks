        affiliation: 52°North GmbH
      - name: Panagiotis (Peter) A. Vretanos
        affiliation: CubeWerx Inc.

    wg: WPS SWG
    keywords:
      - OGC API
      - processes
      - geospatial
      - web processing

    abstract: |
      The OGC API — Processes Standard specifies a Web API that enables the execution of computing
      processes, the retrieval of metadata describing their purpose and functionality and the retrieval
      of the results of the process execution. The requirements specified in the OGC API — Processes
      Standard build on the OGC Web Processing Service (WPS) 2.0 Standard and specify a processing
      interface to communicate over a RESTful protocol using JSON encodings.

