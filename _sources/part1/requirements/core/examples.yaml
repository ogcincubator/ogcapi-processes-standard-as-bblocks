- title: Process list
  content: |
    A successful response to `GET /processes` returns a JSON object conforming to the
    `processList` schema. Each entry in the `processes` array is a process summary.
    The response also includes `links` for pagination and self-reference.
  snippets:
    - language: json
      ref: examples/ProcessList.json

- title: Process description
  content: |
    A successful response to `GET /processes/{processId}` returns a JSON object
    conforming to the `process` schema, including full input/output definitions.
  snippets:
    - language: json
      ref: examples/ProcessDescription.json
